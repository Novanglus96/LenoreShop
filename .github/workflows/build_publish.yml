name: Build & Publish

on:
  release:
    types: [published]

permissions:
  contents: read

env:
  VERSION: ${{ github.event.release.tag_name }}
  IS_PRERELEASE: ${{ github.event.release.prerelease }}

jobs:
  docker:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.VERSION }}

      - name: Extract major/minor versions
        id: version_parts
        run: |
          MAJOR=$(echo $VERSION | cut -d. -f1 | sed 's/v//')
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)
          echo "MAJOR=v$MAJOR" >> $GITHUB_ENV
          echo "MINOR=v$MAJOR.$MINOR" >> $GITHUB_ENV

          # Check for pre-release suffix (e.g. -rc.1, -alpha.1, -beta.2, etc.)
          if [[ "$VERSION" == *"-"* ]]; then
            PRERELEASE=true
            PRERELEASE_TAG=$(echo "$VERSION" | grep -oP '(?<=-)(rc|alpha|beta)')
            echo "PRERELEASE=$PRERELEASE" >> $GITHUB_ENV
            echo "PRERELEASE_TAG=$PRERELEASE_TAG" >> $GITHUB_ENV
          else
            PRERELEASE=false
            PRERELEASE_TAG=""
            echo "PRERELEASE=$PRERELEASE" >> $GITHUB_ENV
            echo "PRERELEASE_TAG=$PRERELEASE_TAG" >> $GITHUB_ENV
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Compute project identifiers
        shell: bash
        run: |
          SLUG="$(echo "${{ github.event.repository.name }}" \
            | tr '[:upper:]' '[:lower:]')"
          echo "APP_NAME=${SLUG}_app" >> "$GITHUB_ENV"

      - name: Check if Docker tag exists
        env:
          DOCKER_HUB_REPO: ${{ secrets.DOCKER_USERNAME }}
        id: docker_tag_check
        run: |
          IMAGE="${DOCKER_HUB_REPO}/${APP_NAME}"
          if curl --silent -f -lSL "https://hub.docker.com/v2/repositories/${IMAGE}/tags/${VERSION}" > /dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Build Docker image
        if: steps.docker_tag_check.outputs.exists == 'false'
        run: |
          echo "Building Docker image..."
          docker compose -f docker-compose-prod.yml build
          echo "Docker image built successfully."

      - name: Publish Docker image
        if: steps.docker_tag_check.outputs.exists == 'false'
        env:
          DOCKER_HUB_REPO: ${{ secrets.DOCKER_USERNAME }}
        run: |
          echo "Publishing Docker image to $DOCKER_HUB_REPO..."

          # Tag with release version
          docker tag ${APP_NAME}:production $DOCKER_HUB_REPO/${APP_NAME}:${VERSION}
          docker push $DOCKER_HUB_REPO/${APP_NAME}:${VERSION}

          echo "Prerelease = $PRERELEASE : TAG: $PRERELEASE_TAG"
          if [[ "$PRERELEASE" == "true" && -n "$PRERELEASE_TAG" ]]; then
            echo "Tagging prerelease as $PRERELEASE_TAG..."
            docker tag ${APP_NAME}:production $DOCKER_HUB_REPO/${APP_NAME}:$PRERELEASE_TAG
            docker push $DOCKER_HUB_REPO/${APP_NAME}:$PRERELEASE_TAG
          fi

          if [[ "$PRERELEASE" == "false" ]]; then
            echo "Tagging as latest, ${MAJOR}, and ${MINOR} (final release)"
            docker tag ${APP_NAME}:production $DOCKER_HUB_REPO/${APP_NAME}:latest
            docker tag ${APP_NAME}:production $DOCKER_HUB_REPO/${APP_NAME}:${MAJOR}
            docker tag ${APP_NAME}:production $DOCKER_HUB_REPO/${APP_NAME}:${MINOR}
            docker push $DOCKER_HUB_REPO/${APP_NAME}:latest
            docker push $DOCKER_HUB_REPO/${APP_NAME}:${MAJOR}
            docker push $DOCKER_HUB_REPO/${APP_NAME}:${MINOR}
          else
            echo "Skipping latest/major/minor tagging for prerelease (${VERSION})"
          fi

          echo "Published Docker image for version ${VERSION}."
